server.port=${PORT:8080}
spring.application.name=weather-app

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Jackson
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.indent_output=true

# Open-Meteo base URLs (no API key needed)
weather.geocoding.url=https://geocoding-api.open-meteo.com/v1
weather.forecast.url=https://api.open-meteo.com/v1

# Logging
logging.level.com.weather=DEBUG
